  <body>
自作のプログラミング言語とコンパイラーと仮想機械を使って、<br>
ゲーム機のようなものを再現しています。<br>
ソースコードは<a href="https://github.com/mugisaku/gbcc-rust">https://github.com/mugisaku/gbcc-rust</a>
  <hr>
  <button id="run_btn">run</button>
  <button id="audio_btn">audio on/off</button><p>
  <span class="root">
    <span class="console">
      <span id="report"></span>
      <canvas id="display" width="400" height="200">
      </canvas>
      <span class="input">
        <span class="cursor">
          <button id="up">↑</button>
          <span class="left_right">
            <button id="left">←</button>
            <button id="right">→</button>
          </span>
          <button id="down">↓</button>
        </span>
        <span class="fn">
          <button id="z">Z</button>
          <button id="x">X</button>
          <button id="c">C</button>
          <button id="v">V</button>
        </span>
      </span>
    </span>
  <span>
    <textarea id="text" cols="30" rows="12">
io input;
io video;
io time;

io sin_freq;
io sin_vol ;
io squ_freq;
io squ_vol ;
io saw_freq;
io saw_vol ;
io tri_freq;
io tri_vol ;
io noi_vol ;

io report;

field video_field 4*VIDEO_W*VIDEO_H;

const VIDEO_W = 400;
const VIDEO_H = 200;

const    UP_KEY = 0b00000001;
const  LEFT_KEY = 0b00000010;
const RIGHT_KEY = 0b00000100;
const  DOWN_KEY = 0b00001000;
const     Z_KEY = 0b00010000;
const     X_KEY = 0b00100000;
const     C_KEY = 0b01000000;
const     V_KEY = 0b10000000;


fn
sleep(tm)
{
  var  base = time;

    loop
    {
        if (time-base) >= tm
        {
          break;
        }


      halt;
    }
}


fn
dot(x,y,pixel)
{
  (video+(4*VIDEO_W*y)+(4*x)).u32 = pixel;
}


fn
draw_rect(x,y,w,h,pixel)
{
    for off in w
    {
      dot(x+off,y    ,pixel);
      dot(x+off,y+h-1,pixel);
    }


    for off in h
    {
      dot(x    ,y+off,pixel);
      dot(x+w-1,y+off,pixel);
    }
}


fn
print_int(i,f,x,y,w,pixel)
{
    if i == 0
    {
      f('0',x,y,pixel);

      return;
    }


    while i
    {
      f('0'+(i%10),x,y,pixel);

      x -=  w;
      i /= 10;
    }
}


fn
print8_unicode(u,x,y,pixel)
{
  var  ptr = FONT8_START+(8*u);

    for y_off in 8
    {
      var  bits = ptr.u8;
                  ptr += 1;

        for x_off in 8
        {
            if bits&0x80
            {
              dot(x+x_off,y+y_off,pixel);
            }


          bits <<= 1;
        }
    }
}


fn
print14_unicode(u,x,y,pixel)
{
  var  ptr = FONT14_START+(2*14*u);

    for y_off in 14
    {
      var  bits = ptr.u16;
                  ptr += 2;

        for x_off in 14
        {
            if bits&0x8000
            {
              dot(x+x_off,y+y_off,pixel);
            }


          bits <<= 1;
        }
    }
}


fn
print14_unicode_s(s,x,y,pixel)
{
    loop
    {
      var  u = s.u16;
               s += 2;

        if u == 0
        {
          break;
        }


      print14_unicode(u,x,y,pixel);

      x += 16;
    }
}


fn
fill(x,y,w,h,pixel)
{
  var  base_ptr = video+(4*VIDEO_W*y)+(4*x);

    for y_off in h
    {
      var  ptr = base_ptr             ;
                 base_ptr += 4*VIDEO_W;

        for x_off in w
        {
          ptr.u32 = pixel;

          ptr += 4;
        }
    }
}


fn
main()
{
  video = video_field;

  var  x = 80;
  var  y = 80;

  loop
  {
    fill(0,0,VIDEO_W,VIDEO_H,0);

         if (input&UP_KEY   )&&(y >=                8){y -= 8;}
    else if (input&DOWN_KEY )&&((y+24) <= (VIDEO_H-8)){y += 8;}
         if (input&LEFT_KEY )&&(x >=                8){x -= 8;}
    else if (input&RIGHT_KEY)&&((x+24) <= (VIDEO_W-8)){x += 8;}

    print_int(x,print14_unicode,16*8, 0,16,0xFFFFFFFF);
    print_int(y,print14_unicode,16*8,16,16,0xFFFFFFFF);

    print14_unicode_s("＜アリだー",x,y,0xFFFFFFFF);

    halt;
  }


  loop{halt;}
}
    </textarea>
    <textarea id="asm_text" cols="16" rows="12">
    </textarea>
  </span>

    <script>function  check(s){console.log(s);}</script>
    <script type="module">
      import init, {
        get_byte,
        put_byte,
        get_word,
        put_word,
        get_io,
        get_const,
        process,
        setup } from "./pkg/gblib.js";

      let  g_text;
      let  g_asmtext;

      let  g_ready;

      let  g_cv;
      let  g_cvctx;
      let  g_imgdat;

      let  g_actx;
      let  g_sin_osc;
      let  g_squ_osc;
      let  g_saw_osc;
      let  g_tri_osc;
      let  g_noi;
      let  g_noi_buf;
      let  g_noi_buf_size;
      let  g_sin_gain;
      let  g_squ_gain;
      let  g_saw_gain;
      let  g_tri_gain;
      let  g_noi_gain;

      let  g_key_state = 0;
      let  g_up_key;
      let  g_left_key;
      let  g_right_key;
      let  g_down_key;
      let  g_z_key;
      let  g_x_key;
      let  g_c_key;
      let  g_v_key;

      const  g_volume_max = 0.1;

      const  g_millisec = 1000/20;

      let  g_input_addr;
      let  g_video_addr;
      let   g_time_addr;

      let  g_sin_freq_addr;
      let  g_sin_vol_addr ;
      let  g_squ_freq_addr;
      let  g_squ_vol_addr ;
      let  g_saw_freq_addr;
      let  g_saw_vol_addr ;
      let  g_tri_freq_addr;
      let  g_tri_vol_addr ;
      let  g_noi_vol_addr ;

      let  g_report_addr;
      let  g_report;

      function
      get_freq(addr)
      {
        const  n = Math.min(12*6,get_word(addr));

        return (440.0/4)*Math.pow(2,n/12)
      }

      function
      get_vol(addr)
      {
        return g_volume_max/256*Math.min(256,get_word(addr));
      }

      function
      update_audio()
      {
          if(g_actx)
          {
            g_sin_osc.frequency.value = get_freq(g_sin_freq_addr);
            g_squ_osc.frequency.value = get_freq(g_squ_freq_addr);
            g_saw_osc.frequency.value = get_freq(g_saw_freq_addr);
            g_tri_osc.frequency.value = get_freq(g_tri_freq_addr);

            g_sin_gain.gain.value = get_vol(g_sin_vol_addr);
            g_squ_gain.gain.value = get_vol(g_squ_vol_addr);
            g_saw_gain.gain.value = get_vol(g_saw_vol_addr);
            g_tri_gain.gain.value = get_vol(g_tri_vol_addr);
            g_noi_gain.gain.value = get_vol(g_noi_vol_addr);
          }
      }

      function
      switch_audio()
      {
          if(g_actx)
          {
              if(g_actx.state === "running")
              {
                g_actx.suspend();
              }

            else
              {
                g_actx.resume();
              }
          }

        else
          {
            start_audio();
          }
      }

      function
      fill_noise()
      {
        const  data = g_noi_buf.getChannelData(0);

          for(let  i = 0;  i < g_noi_buf_size;  ++i)
          {
            data[i] = Math.random()*2-1;
          }
      }

      function
      start_audio()
      {
          if(!g_actx)
          {
            g_actx = new AudioContext();

            g_noi_buf_size = g_actx.sampleRate*1024;

            g_sin_osc = new OscillatorNode(g_actx,{type:     "sine", frequency: 440});
            g_squ_osc = new OscillatorNode(g_actx,{type:   "square", frequency: 440});
            g_saw_osc = new OscillatorNode(g_actx,{type: "sawtooth", frequency: 440});
            g_tri_osc = new OscillatorNode(g_actx,{type: "triangle", frequency: 440});

            g_noi_buf = new AudioBuffer({length: g_noi_buf_size, sampleRate: g_actx.sampleRate});

            fill_noise();

            g_noi = new AudioBufferSourceNode(g_actx,{buffer: g_noi_buf});

            g_noi.loop = true;

            g_sin_gain = g_actx.createGain();
            g_squ_gain = g_actx.createGain();
            g_saw_gain = g_actx.createGain();
            g_tri_gain = g_actx.createGain();
            g_noi_gain = g_actx.createGain();

            g_sin_gain.gain.value = 0;
            g_squ_gain.gain.value = 0;
            g_saw_gain.gain.value = 0;
            g_tri_gain.gain.value = 0;
            g_noi_gain.gain.value = 0;

            g_sin_osc.connect(g_sin_gain).connect(g_actx.destination);
            g_squ_osc.connect(g_squ_gain).connect(g_actx.destination);
            g_saw_osc.connect(g_saw_gain).connect(g_actx.destination);
            g_tri_osc.connect(g_tri_gain).connect(g_actx.destination);
            g_noi.connect(g_noi_gain).connect(g_actx.destination);

            g_sin_osc.start();
            g_squ_osc.start();
            g_saw_osc.start();
            g_tri_osc.start();
            g_noi.start();
          }
      }


      function
      refresh()
      {
          if(!g_ready)
          {
            return;
          }


        put_byte(g_input_addr,g_key_state);

        const  new_time = get_word(g_time_addr)+g_millisec;

        put_word(g_time_addr,new_time);

        process();

        const  base = get_word(g_video_addr);

          for(let  i = 0|0;  i < (g_imgdat.width*g_imgdat.height);  ++i)
          {
            const  rgba_i = 4*i;

            const  pixel = get_word(base+rgba_i);

            g_imgdat.data[rgba_i  ] = (pixel>>24)&0xFF;
            g_imgdat.data[rgba_i+1] = (pixel>>16)&0xFF;
            g_imgdat.data[rgba_i+2] = (pixel>> 8)&0xFF;
          }


        g_cvctx.putImageData(g_imgdat,0,0);

        update_audio();

        g_report.innerText = "REPORT: "+get_word(g_report_addr);
      }


      function
      run()
      {
        g_ready = setup(g_text.value,1024*1024*16);

          if(g_ready)
          {
            g_asmtext.value = g_ready;

            g_input_addr = get_io("input");
            g_video_addr = get_io("video");
            g_time_addr  = get_io("time");
            g_sin_freq_addr = get_io("sin_freq");
            g_sin_vol_addr  = get_io("sin_vol");
            g_squ_freq_addr = get_io("squ_freq");
            g_squ_vol_addr  = get_io("squ_vol");
            g_saw_freq_addr = get_io("saw_freq");
            g_saw_vol_addr  = get_io("saw_vol");
            g_tri_freq_addr = get_io("tri_freq");
            g_tri_vol_addr  = get_io("tri_vol");
            g_noi_vol_addr  = get_io("noi_vol");
            g_report_addr   = get_io("report");

            g_up_key    = get_const("UP_KEY");
            g_left_key  = get_const("LEFT_KEY");
            g_right_key = get_const("RIGHT_KEY");
            g_down_key  = get_const("DOWN_KEY");
            g_z_key     = get_const("Z_KEY");
            g_x_key     = get_const("X_KEY");
            g_c_key     = get_const("C_KEY");
            g_v_key     = get_const("V_KEY");

            g_cv.width  = get_const("VIDEO_W");
            g_cv.height = get_const("VIDEO_H");

            g_imgdat = g_cvctx.createImageData(g_cv.width,g_cv.height);

              for(let  i = 0|0;  i < (g_imgdat.width*g_imgdat.height);  ++i)
              {
                g_imgdat.data[(4*i)+3] = 255;
              }
          }
      }

      init().then(() => {
        g_cv = document.getElementById("display");

        g_cvctx = g_cv.getContext("2d");

        g_cvctx.fillStyle = "rgb(0,0,0)";

        g_cvctx.fillRect(0,0,g_cv.width,g_cv.height);

        g_report = document.getElementById("report");
        g_text = document.getElementById("text");
        g_asmtext = document.getElementById("asm_text");

        document.getElementById("run_btn").addEventListener("click",run);
        document.getElementById("audio_btn").addEventListener("click",switch_audio);

        document.getElementById("up").addEventListener("mousedown",function(){g_key_state |=  g_up_key;});
        document.getElementById("up").addEventListener(  "mouseup",function(){g_key_state &= ~g_up_key;});
        document.getElementById("left").addEventListener("mousedown",function(){g_key_state |=  g_left_key;});
        document.getElementById("left").addEventListener(  "mouseup",function(){g_key_state &= ~g_left_key;});
        document.getElementById("right").addEventListener("mousedown",function(){g_key_state |=  g_right_key;});
        document.getElementById("right").addEventListener(  "mouseup",function(){g_key_state &= ~g_right_key;});
        document.getElementById("down").addEventListener("mousedown",function(){g_key_state |=  g_down_key;});
        document.getElementById("down").addEventListener(  "mouseup",function(){g_key_state &= ~g_down_key;});
        document.getElementById("z").addEventListener("mousedown",function(){g_key_state |=  g_z_key;});
        document.getElementById("z").addEventListener(  "mouseup",function(){g_key_state &= ~g_z_key;});
        document.getElementById("x").addEventListener("mousedown",function(){g_key_state |=  g_x_key;});
        document.getElementById("x").addEventListener(  "mouseup",function(){g_key_state &= ~g_x_key;});
        document.getElementById("c").addEventListener("mousedown",function(){g_key_state |=  g_c_key;});
        document.getElementById("c").addEventListener(  "mouseup",function(){g_key_state &= ~g_c_key;});
        document.getElementById("v").addEventListener("mousedown",function(){g_key_state |=  g_v_key;});
        document.getElementById("v").addEventListener(  "mouseup",function(){g_key_state &= ~g_v_key;});

        document.addEventListener("keydown",function(evt){
            switch(evt.key)
            {
          case    "ArrowUp": g_key_state |=    g_up_key;break;
          case  "ArrowLeft": g_key_state |=  g_left_key;break;
          case "ArrowRight": g_key_state |= g_right_key;break;
          case  "ArrowDown": g_key_state |=  g_down_key;break;
          case  "Z": g_key_state |= g_z_key;break;
          case  "X": g_key_state |= g_x_key;break;
          case  "C": g_key_state |= g_c_key;break;
          case  "V": g_key_state |= g_v_key;break;
            }
        });

        document.addEventListener("keyup",function(evt){
            switch(evt.key)
            {
          case    "ArrowUp": g_key_state &=    ~g_up_key;break;
          case  "ArrowLeft": g_key_state &=  ~g_left_key;break;
          case "ArrowRight": g_key_state &= ~g_right_key;break;
          case  "ArrowDown": g_key_state &=  ~g_down_key;break;
          case  "Z": g_key_state &= ~g_z_key;break;
          case  "X": g_key_state &= ~g_x_key;break;
          case  "C": g_key_state &= ~g_c_key;break;
          case  "V": g_key_state &= ~g_v_key;break;
            }
        });


        setInterval(refresh,g_millisec);
      });
    </script>
  </body>
</html>
