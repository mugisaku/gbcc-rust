<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>hello-wasm gamebaby example</title>
  </head>
  <body>
自作のプログラミング言語とコンパイラーと仮想機械を使って、
ゲーム機のようなものを再現しています。
runを押せば、ソースコードをコンパイルして実行します。
サンプルでは、インプットレジスタの値を見て、押された方向キーによって、
ビデオレジスタの値を書き換え、画面をスクロールしています。
JavaScript部分は、キー入力状態を仮想機械が使う疑似メモリー空間の
インプットレジスタに相当するアドレスに書き込むことと、
一定時間毎に仮想機械を動作させた後、ビデオレジスタに相当するアドレスから値を読み出し、
その値が指す疑似メモリー空間のバイト列を画像として表示しているだけです。
  <hr>
  <button id="run_btn">run</button><p>
  <!--button id="audio_btn">audio</button--><p>
  <canvas id="display"></canvas>
  <textarea id="text" cols="30" rows="12">
io INPUT at 0;
io VIDEO at 8;
io time  at 16;
io audio_freq  at 24;
io audio_vol   at 32;
io report      at 40;

const HEAP_START = 1024;
const HEAP_SIZE  =  200;

const DATA_START      = (HEAP_START+HEAP_SIZE);
const TEXT_START      = (HEAP_START+HEAP_SIZE)+(1024*1);
const STACK_START     = (HEAP_START+HEAP_SIZE)+(1024*2);
const CALLSTACK_START = (HEAP_START+HEAP_SIZE)+(1024*3);

const     STACK_SIZE  = 1024;
const CALLSTACK_SIZE  = 1024;

const VIDEO_W = 400;

const    UP_KEY = 0b0001;
const  LEFT_KEY = 0b0010;
const RIGHT_KEY = 0b0100;
const  DOWN_KEY = 0b1000;


fn
main()
{
  report = time;

  audio_vol = 127;

    loop
    {
        if time-report >= 1000
        {
          report = time;

          audio_freq += 1;
        }
      

      halt;
    }


  return;
}
  </textarea>
  <textarea id="asm_text" cols="16" rows="12">
  </textarea>
    <script>function  check(s){console.log(s);}</script>
    <script type="module">
      import init, {
        get_width,
        get_height,
        get_pixel,
        get_audio_freq,
        get_audio_vol,
        set_input_up,
        unset_input_up,
        set_input_left,
        unset_input_left,
        set_input_right,
        unset_input_right,
        set_input_down,
        unset_input_down,
        set_input_enter,
        unset_input_enter,
        add_time,
        get_report,
        process,
        setup } from "./pkg/gblib.js";

      let  g_text;
      let  g_asmtext;

      let  g_ready;

      let  g_cv;
      let  g_cvctx;
      let  g_imgdat;

      let  g_actx;
      let  g_osc;
      let  g_gain;
      const  g_millisec = 1000/20;

      function
      update_audio()
      {
          if(g_actx)
          {
            const  max_vol = 0.2;

            g_osc.frequency.value = 440.0*Math.pow(2,get_audio_freq()/12);
            g_gain.gain.value     = max_vol/256*Math.min(256,get_audio_vol());
          }
      }

      function
      start_audio()
      {
          if(!g_actx)
          {
            g_actx = new AudioContext();

            g_osc = new OscillatorNode(g_actx,{type: "sine", frequency: 440});

            g_gain = g_actx.createGain();
            g_gain.gain.value = 0.0;

            g_osc.connect(g_gain).connect(g_actx.destination);

            g_osc.start();
          }
      }


      function
      refresh()
      {
          if(!g_ready)
          {
            return;
          }

console.log(get_report());
        add_time(g_millisec);

        process();

          for(let  y = 0|0;  y < g_imgdat.height;  ++y){
          for(let  x = 0|0;  x < g_imgdat.width;   ++x){
            let  i = ((4*g_imgdat.width)*y)+(4*x);

            const  pix = get_pixel(x,y);

            g_imgdat.data[i+0] = (pix>>24)&0xFF;
            g_imgdat.data[i+1] = (pix>>16)&0xFF;
            g_imgdat.data[i+2] = (pix>> 8)&0xFF;
            g_imgdat.data[i+3] = 255;
          }}


        g_cvctx.putImageData(g_imgdat,0,0);

        update_audio();
      }


      function
      run()
      {
        g_ready = setup(g_text.value);

          if(g_ready)
          {
            g_asmtext.value = g_ready;

            start_audio();
          }
      }

      init().then(() => {
        g_cv = document.getElementById("display");

        g_cv.width  = get_width();
        g_cv.height = get_height();

        g_cvctx = g_cv.getContext("2d");

        g_imgdat = g_cvctx.createImageData(g_cv.width,g_cv.height);

        g_cvctx.fillStyle = "black";
        g_cvctx.fillRect(0,0,g_cv.width,g_cv.height);

        g_text = document.getElementById("text");
        g_asmtext = document.getElementById("asm_text");

        document.getElementById("run_btn").addEventListener("click",run);

        document.addEventListener("keydown",function(evt){
            switch(evt.key)
            {
          case    "ArrowUp":    set_input_up();break;
          case  "ArrowLeft":  set_input_left();break;
          case "ArrowRight": set_input_right();break;
          case  "ArrowDown":  set_input_down();break;
          case      "Enter": set_input_enter();break;
            }
        });

        document.addEventListener("keyup",function(evt){
            switch(evt.key)
            {
          case    "ArrowUp":    unset_input_up();break;
          case  "ArrowLeft":  unset_input_left();break;
          case "ArrowRight": unset_input_right();break;
          case  "ArrowDown":  unset_input_down();break;
          case      "Enter": unset_input_enter();break;
            }
        });


        setInterval(refresh,g_millisec);
      });
    </script>
  </body>
</html>
